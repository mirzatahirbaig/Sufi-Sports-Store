services:
  customer-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sufisports-customer-web
    ports:
      - "4200:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - sufi-network

networks:
  sufi-network:
    driver: bridge
