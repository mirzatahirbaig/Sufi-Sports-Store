name: Deploy Angular Storefront to DigitalOcean

on:
  push:
    branches:
      - Production
      - production
      - main

jobs:
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script: |
            # Navigate to project folder on droplet
            cd ${{ secrets.DROPLET_PROJECT_PATH || '/root/Sufi-Sports-Store' }}
            
            # Pull latest changes from active branch
            git fetch --all
            git reset --hard origin/Production || git reset --hard origin/production || git reset --hard origin/main
            
            # Rebuild and restart Angular customer web container
            docker compose up -d --build customer-web
            
            # Cleanup unused docker images to save space
            docker image prune -f
