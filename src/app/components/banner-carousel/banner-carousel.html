<div class="carousel-container">
  @for (banner of banners; track banner.id; let idx = $index) {
    <div class="carousel-slide" [class.active]="idx === currentIndex">
      <div class="slide-image-wrapper">
        <img [src]="resolveImageUrl(banner.imageUrl)" [alt]="banner.title || 'Custom Sports Manufacturing Banner'" class="slide-image" />
        <div class="slide-overlay"></div>
      </div>

      <div class="container slide-content-wrapper">
        <div class="slide-content">
          @if (banner.title) {
            <h1 class="slide-title">{{ banner.title }}</h1>
          }
          
          @if (banner.subtitle) {
            <p class="slide-desc">{{ banner.subtitle }}</p>
          }
          
          <div class="slide-actions">
            <a [routerLink]="banner.targetUrl || '/products'" class="btn-shopify-red">
              <i class="fa-solid fa-arrow-right-long me-1"></i>
              {{ banner.callToAction || 'Explore Catalog' }}
            </a>
          </div>
        </div>
      </div>
    </div>
  }

  <!-- Navigation Controls -->
  @if (banners.length > 1) {
    <button class="nav-btn prev" (click)="prevSlide(true)" aria-label="Previous slide">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <button class="nav-btn next" (click)="nextSlide(true)" aria-label="Next slide">
      <i class="fa-solid fa-chevron-right"></i>
    </button>

    <!-- Slide Indicators -->
    <div class="carousel-indicators">
      @for (banner of banners; track banner.id; let idx = $index) {
        <button class="indicator-dot" [class.active]="idx === currentIndex" (click)="setSlide(idx)" [aria-label]="'Slide ' + (idx + 1)">
        </button>
      }
    </div>
  }
</div>
