<div class="shopify-product-card shopify-card">
  <div class="product-image-box">
    <a [routerLink]="['/products', product.id]">
      <img [src]="resolveImageUrl(product.imageUrls)" [alt]="product.name" class="product-image" />
    </a>

    <!-- Custom Manufacturing Badges Overlay (No In-Stock/Out-of-Stock) -->
    <div class="product-badges">
      @if (product.isFeatured) {
        <span class="badge-red">FEATURED DESIGN</span>
      }
      <span class="badge-orange">100% MADE TO ORDER</span>
    </div>

    <!-- Quick Hover Overlay Action -->
    <div class="quick-action-overlay">
      <a [routerLink]="['/products', product.id]" class="btn-shopify-black btn-sm">
        <i class="fa-solid fa-eye me-1"></i> View Specifications
      </a>
    </div>
  </div>

  <div class="product-details">
    <div class="product-meta">
      <span class="product-category">{{ product.category || 'Boxing Gear' }}</span>
      <span class="custom-pill"><i class="fa-solid fa-stamp me-1"></i> Custom Branding Ready</span>
    </div>

    <h3 class="product-title">
      <a [routerLink]="['/products', product.id]">{{ product.name }}</a>
    </h3>

    <div class="product-card-footer">
      <div class="price-box">
        <span class="price-label">Unit Price</span>
        <span class="price-value">${{ product.price.toFixed(2) }}</span>
      </div>

      <a routerLink="/contact" [queryParams]="{product: product.name, id: product.id}" class="btn-shopify-red btn-card-action">
        <span>Request Quote</span>
        <i class="fa-solid fa-pen-ruler"></i>
      </a>
    </div>
  </div>
</div>
