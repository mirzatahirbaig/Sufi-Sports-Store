<!-- Top Announcement Bar (Shopify Style - Dynamic Infinite Marquee) -->
<div class="announcement-bar">
  <div class="announcement-ticker-track">
    <div class="ticker-content">
      @for (point of getTickerPoints(); track $index) {
      <span class="ticker-item">
        <i class="fa-solid fa-bolt text-orange me-1"></i>
        {{ point }}
      </span>
      <span class="ticker-bullet">&bull;</span>
      }

      <!-- Duplicate set for seamless continuous looping -->
      @for (point of getTickerPoints(); track $index) {
      <span class="ticker-item">
        <i class="fa-solid fa-bolt text-orange me-1"></i>
        {{ point }}
      </span>
      <span class="ticker-bullet">&bull;</span>
      }
    </div>
  </div>
</div>

<!-- Main Navbar -->
<nav class="navbar-wrapper">
  <div class="container navbar-container">
    <!-- Brand Logo -->
    <a routerLink="/" class="navbar-brand" (click)="closeMobileMenu()">
      <img src="logo.png" alt="Sufi Sports Logo" class="brand-logo-img" />
      <span class="brand-text">SUFI</span><span class="brand-accent">SPORTS</span>
    </a>

    <!-- Desktop Navigation Links -->
    <div class="navbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/products" routerLinkActive="active">Shop Products</a>
      <a routerLink="/blog" routerLinkActive="active">Blog</a>
      <a routerLink="/contact" routerLinkActive="active">Contact Us</a>
    </div>

    <!-- Right Actions -->
    <div class="navbar-actions">
      <a routerLink="/products" class="action-icon" title="Search Equipment" aria-label="Search Equipment">
        <i class="fa-solid fa-magnifying-glass"></i>
      </a>
      <a routerLink="/contact" class="btn-shopify-red btn-header-cta">
        <i class="fa-solid fa-paper-plane"></i>
        <span>Enquire</span>
      </a>

      <!-- Mobile Menu Toggle Button -->
      <button class="mobile-toggle" (click)="toggleMobileMenu()" aria-label="Toggle Navigation">
        <i class="fa-solid" [class.fa-bars]="!isMobileMenuOpen" [class.fa-xmark]="isMobileMenuOpen"></i>
      </button>
    </div>
  </div>

  <!-- Mobile Navigation Menu -->
  @if (isMobileMenuOpen) {
  <div class="mobile-menu">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
      (click)="closeMobileMenu()">Home</a>
    <a routerLink="/products" routerLinkActive="active" (click)="closeMobileMenu()">Shop Products</a>
    <a routerLink="/blog" routerLinkActive="active" (click)="closeMobileMenu()">Blog</a>
    <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact Us</a>
    <div class="mobile-menu-footer">
      <a routerLink="/contact" class="btn-shopify-red w-full" (click)="closeMobileMenu()">
        <i class="fa-solid fa-paper-plane"></i> Submit Inquiry
      </a>
    </div>
  </div>
  }
</nav>
